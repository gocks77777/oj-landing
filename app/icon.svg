<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="O&amp;J">
  <defs>
    <linearGradient id="favGrad" x1="12" y1="12" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#6ea8fe"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="64" height="64" rx="16" fill="#13161f"/>

  <!-- simplified mark: open ring + node + short J hook, thicker strokes for small sizes -->
  <!-- O : open ring -->
  <path d="M 45 18 A 19 19 0 1 1 32 13"
        fill="none" stroke="url(#favGrad)" stroke-width="6" stroke-linecap="round"/>
  <!-- node dot -->
  <circle cx="46.5" cy="20" r="3.6" fill="url(#favGrad)"/>
  <!-- J : nested stem + hook -->
  <path d="M 37 21 L 37 38 A 6.5 6.5 0 0 1 24 38"
        fill="none" stroke="url(#favGrad)" stroke-width="6" stroke-linecap="round"/>
</svg>
